<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Günde Hacklenme — Siber Güvenlik Farkındalık Simülasyonu</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#141a27;--surface:#1a2235;--surface2:#232d42;--surface3:#2e3a52;
--accent:#00e5ff;--accent2:#7c4dff;--danger:#ff1744;--success:#00e676;--warning:#ffab00;
--text:#e8eaf6;--text2:#90a4ae;--text3:#546e7a;
--glow:0 0 20px rgba(0,229,255,.15);
--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{width:100%;min-height:100vh;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(26,34,53,.9);border:1px solid rgba(0,229,255,.1);border-radius:14px;margin-bottom:16px;backdrop-filter:blur(10px)}
.header-brand{display:flex;align-items:center;gap:10px}
.header-brand .shield{font-size:24px}
.header-brand h1{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:14px}
.step-indicator{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--surface2);padding:5px 12px;border-radius:8px}
.progress-dots{display:flex;gap:5px}
.pdot{width:7px;height:7px;border-radius:50%;transition:all .3s}
.pdot.done{background:var(--success)}.pdot.current{background:var(--accent);box-shadow:0 0 8px var(--accent)}.pdot.upcoming{background:var(--surface3)}
.risk-container{margin-bottom:16px}
.risk-bar-outer{width:100%;height:6px;background:var(--surface2);border-radius:8px;overflow:hidden}
.risk-bar-inner{height:100%;border-radius:8px;transition:width .8s cubic-bezier(.34,1.56,.64,1),background .5s;width:0%}
.risk-labels{display:flex;justify-content:space-between;margin-top:6px}
.risk-labels span{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.risk-score{font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;margin-top:4px}
.scene-card{flex:1;background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;animation:cardIn .6s ease-out}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}
.scene-visual{position:relative;height:360px;overflow:hidden}
.scene-visual img{width:100%;height:100%;object-fit:cover;animation:slowZoom 15s ease-in-out infinite alternate}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.08)}}
.scene-visual::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,rgba(26,34,53,.95));pointer-events:none}
.scene-time{position:absolute;top:14px;left:16px;font-family:var(--mono);font-size:11px;color:var(--accent);background:rgba(0,0,0,.6);padding:5px 12px;border-radius:8px;border:1px solid rgba(0,229,255,.2);z-index:10;backdrop-filter:blur(6px)}
.scene-topic{position:absolute;top:14px;right:16px;font-size:10px;color:var(--accent2);background:rgba(0,0,0,.6);padding:5px 12px;border-radius:8px;border:1px solid rgba(124,77,255,.2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;z-index:10;backdrop-filter:blur(6px)}
.video-overlay{position:absolute;z-index:5;pointer-events:none}
.wifi-overlay{bottom:80px;right:20px;width:220px;background:rgba(20,26,39,.85);border-radius:10px;padding:12px;border:1px solid rgba(0,229,255,.15);backdrop-filter:blur(8px);animation:slideUp .8s ease-out .5s both}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.wifi-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:6px;font-family:var(--mono);font-size:10px}
.wifi-item.danger{background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:#ff8a80;animation:wifiBlink 2s infinite}
.wifi-item.safe{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.15);color:#69f0ae}
.wifi-item.neutral{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.12);color:#80deea}
@keyframes wifiBlink{0%,100%{border-color:rgba(255,23,68,.25)}50%{border-color:rgba(255,23,68,.6)}}
.wifi-header{font-size:9px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.email-overlay{top:50px;left:50%;transform:translateX(-50%);width:340px;background:rgba(20,26,39,.88);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.email-from{font-family:var(--mono);font-size:9px;color:#ff8a80;margin-bottom:4px}
.email-subject{font-size:13px;font-weight:700;color:#e0e0f0;margin-bottom:10px}
.email-body{font-size:11px;line-height:1.6;color:var(--text2);margin-bottom:12px}
.email-link{display:inline-block;padding:6px 14px;background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.2);border-radius:6px;font-family:var(--mono);font-size:9px;color:#ff8a80;animation:wifiBlink 2s infinite}
.password-overlay{top:50px;left:50%;transform:translateX(-50%);width:300px;background:rgba(20,26,39,.88);border-radius:12px;padding:18px;border:1px solid rgba(0,229,255,.15);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.pw-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.pw-header span{font-size:20px}.pw-header h4{font-size:12px;color:#e0e0f0;font-weight:700}
.pw-field{margin-bottom:10px}.pw-label{font-size:9px;color:var(--text3);margin-bottom:4px;font-family:var(--mono)}
.pw-input{width:100%;padding:8px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--text)}
.pw-strength{display:flex;gap:4px;margin-top:6px}.pw-bar{flex:1;height:3px;border-radius:2px}
.pw-bar.weak{background:var(--danger)}.pw-bar.empty{background:rgba(255,255,255,.08)}
.pw-weak-text{font-family:var(--mono);font-size:8px;color:var(--danger);margin-top:4px}
.ai-overlay{top:50px;right:20px;width:240px;background:rgba(20,26,39,.88);border-radius:12px;padding:14px;border:1px solid rgba(124,77,255,.15);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.ai-chat-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.ai-chat-header span{font-size:16px}.ai-chat-header h4{font-size:11px;color:#b39ddb;font-weight:700}
.ai-message{font-family:var(--mono);font-size:9px;color:var(--text2);background:rgba(255,255,255,.03);padding:8px 10px;border-radius:8px;margin-bottom:6px;line-height:1.5}
.ai-warning{font-family:var(--mono);font-size:8px;color:#ff8a80;background:rgba(255,23,68,.08);padding:6px 8px;border-radius:6px;border:1px solid rgba(255,23,68,.15);animation:wifiBlink 2.5s infinite}
.ai-data-flow{position:absolute;top:50px;left:20px;width:200px;animation:slideUp .8s ease-out .3s both}
.data-tag{display:inline-block;padding:3px 8px;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.15);border-radius:4px;font-family:var(--mono);font-size:8px;color:#ff8a80;margin:2px}
.cloud-overlay{top:50px;right:20px;width:200px;background:rgba(20,26,39,.88);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.cloud-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:10px;font-family:var(--mono)}
.cloud-option.danger{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.12);color:#ff8a80}
.cloud-option.warn{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.12);color:#ffd54f}
.cloud-option.safe{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.12);color:#69f0ae}
.cloud-file{display:flex;align-items:center;gap:6px;padding:8px;background:rgba(0,229,255,.05);border-radius:8px;margin-bottom:10px;font-family:var(--mono);font-size:9px;color:var(--text2)}
.team-overlay{top:50px;left:50%;transform:translateX(-50%);width:280px;background:rgba(20,26,39,.88);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.team-bubble{background:rgba(255,255,255,.05);border-radius:12px 12px 12px 2px;padding:10px 14px;margin-bottom:10px}
.team-bubble p{font-size:12px;line-height:1.6;color:var(--text)}
.team-bubble .name{font-size:9px;color:var(--accent2);font-weight:700;margin-bottom:4px;font-family:var(--mono)}
.team-login{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,0,0,.3);border-radius:8px;font-family:var(--mono);font-size:9px;color:var(--text3)}
.team-login span{font-size:14px}
.tailgate-overlay{bottom:80px;left:20px;width:260px;background:rgba(20,26,39,.88);border-radius:12px;padding:14px;border:1px solid rgba(255,171,0,.15);backdrop-filter:blur(10px);animation:slideUp .8s ease-out .5s both}
.tailgate-bubble{background:rgba(255,255,255,.05);border-radius:12px 12px 12px 2px;padding:10px 14px;margin-bottom:8px}
.tailgate-bubble p{font-size:12px;line-height:1.5;color:var(--text)}
.tailgate-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--warning)}
.scene-body{padding:28px 28px 24px;flex:1;display:flex;flex-direction:column}
.scene-title{font-size:20px;font-weight:800;margin-bottom:6px}
.scene-location{font-size:12px;color:var(--text2);margin-bottom:14px}
.scene-desc{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:24px}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:auto}
.choice-btn{position:relative;width:100%;text-align:left;padding:16px 20px;background:var(--surface2);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;cursor:pointer;transition:all .25s}
.choice-btn:hover{border-color:rgba(0,229,255,.3);transform:translateX(6px);box-shadow:var(--glow)}
.choice-btn .choice-label{font-weight:700;color:var(--accent);margin-right:8px;font-family:var(--mono)}
.choice-btn:active{transform:translateX(6px) scale(.98)}
.feedback-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(20,26,39,.88);backdrop-filter:blur(10px);animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.feedback-card{max-width:500px;width:90%;padding:32px;border-radius:20px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
.feedback-card.correct{background:linear-gradient(135deg,#1a3e2a,#1d2f25);border:1px solid rgba(0,230,118,.25)}
.feedback-card.wrong{background:linear-gradient(135deg,#3e1a1a,#2f1d1d);border:1px solid rgba(255,23,68,.25)}
.feedback-card.partial{background:linear-gradient(135deg,#3e3a1a,#2f2b1d);border:1px solid rgba(255,171,0,.25)}
.feedback-icon{font-size:52px;margin-bottom:14px}
.feedback-title{font-size:18px;font-weight:800;margin-bottom:10px}
.feedback-text{font-size:13px;line-height:1.6;color:var(--text2);margin-bottom:20px}
.feedback-detail{font-size:11px;line-height:1.6;color:var(--text3);background:rgba(255,255,255,.03);padding:14px;border-radius:10px;margin-bottom:20px;text-align:left;font-family:var(--mono)}
.feedback-btn{padding:12px 32px;border:none;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.feedback-card.correct .feedback-btn{background:var(--success);color:#0a0e17}
.feedback-card.wrong .feedback-btn{background:var(--danger);color:#fff}
.feedback-card.partial .feedback-btn{background:var(--warning);color:#0a0e17}
.feedback-btn:hover{transform:scale(1.05)}
.intro-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.intro-img-wrap{width:100%;max-width:600px;border-radius:16px;overflow:hidden;margin-bottom:30px;position:relative;border:1px solid rgba(0,229,255,.15);height:250px}
.intro-img-wrap img{width:100%;height:100%;object-fit:cover;opacity:.5}
.intro-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 30%,var(--bg) 100%)}
.intro-title{font-size:34px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.intro-sub{font-size:15px;color:var(--text2);margin-bottom:28px;max-width:480px;line-height:1.7}
.intro-topics{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px;max-width:480px}
.intro-topic{font-size:10px;padding:5px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,.06);border-radius:8px;color:var(--text2);font-family:var(--mono)}
.start-btn{padding:16px 44px;border:none;border-radius:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e17;text-transform:uppercase;letter-spacing:2px;transition:all .3s;position:relative}
.start-btn::after{content:'';position:absolute;inset:-2px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));z-index:-1;filter:blur(15px);opacity:.4}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,229,255,.3)}
.result-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.result-badge{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:20px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
.result-title{font-size:30px;font-weight:800;margin-bottom:8px}
.result-subtitle{font-size:14px;color:var(--text2);margin-bottom:28px;max-width:420px;line-height:1.7}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:28px;width:100%;max-width:420px}
.stat-box{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px 14px}
.stat-value{font-size:26px;font-weight:800;font-family:var(--mono);margin-bottom:4px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.result-breakdown{width:100%;max-width:420px;margin-bottom:28px;text-align:left}
.breakdown-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-radius:10px;margin-bottom:6px;font-size:12px;border:1px solid rgba(255,255,255,.04)}
.bi-icon{font-size:16px;flex-shrink:0}.bi-topic{color:var(--text2);flex:1}
.bi-result{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
.bi-result.safe{background:rgba(0,230,118,.1);color:var(--success)}
.bi-result.risky{background:rgba(255,23,68,.1);color:var(--danger)}
.bi-result.partial-r{background:rgba(255,171,0,.1);color:var(--warning)}
.restart-btn{padding:14px 36px;border:none;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--text);border:1px solid rgba(0,229,255,.2);text-transform:uppercase;letter-spacing:1px;transition:all .3s}
.restart-btn:hover{background:var(--accent);color:#0a0e17;transform:translateY(-2px)}
.hack-flash{position:fixed;inset:0;z-index:200;pointer-events:none}
.hack-flash.danger{animation:flashRed .6s ease-out}
.hack-flash.safe{animation:flashGreen .6s ease-out}
@keyframes flashRed{0%{background:rgba(255,23,68,.3)}100%{background:transparent}}
@keyframes flashGreen{0%{background:rgba(0,230,118,.2)}100%{background:transparent}}
.terminal-ticker{font-family:var(--mono);font-size:10px;color:var(--accent);opacity:.4;padding:8px;text-align:center;margin-top:8px}
@media(max-width:600px){.intro-title{font-size:24px}.scene-visual{height:260px}.scene-title{font-size:17px}.scene-body{padding:20px}.result-stats{grid-template-columns:1fr}.header{padding:10px 14px;flex-wrap:wrap;gap:6px}.email-overlay,.password-overlay,.team-overlay{width:90%;left:5%;transform:none}.wifi-overlay,.ai-overlay,.cloud-overlay{width:180px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="flash" class="hack-flash"></div>

let state={currentScene:-1,totalRisk:0,answers:[],maxRisk:0};
function getApp(){return document.getElementById('app')}
function renderIntro(){state={currentScene:-1,totalRisk:0,answers:[],maxRisk:0};const topics=['Ağ Güvenliği','Fiziksel Güvenlik','E-posta / Phishing','Parola Güvenliği','Yapay Zeka Güvenliği','Bulut & DLP','Ekip İş Birliği'];getApp().innerHTML=`<div class="intro-screen"><div class="intro-img-wrap"><img src="${IMG.wifi}" alt=""></div><h1 class="intro-title">Bir Günde Hacklenme</h1><p class="intro-sub">Sıradan bir iş gününde karşılaşacağın 7 gerçekçi siber güvenlik senaryosu.<br>Her seçimin risk puanını etkiler.</p><div class="intro-topics">${topics.map(t=>`<span class="intro-topic">${t}</span>`).join('')}</div><button class="start-btn" onclick="startGame()">Güne Başla →</button></div>`}
function startGame(){state.currentScene=0;renderScene()}
function renderHeader(){const s=state.currentScene;const dots=SCENES.map((_,i)=>{let c='pdot ';if(i<s)c+='done';else if(i===s)c+='current';else c+='upcoming';return`<div class="${c}"></div>`}).join('');return`<div class="header"><div class="header-brand"><span class="shield">🛡️</span><h1>Bir Günde Hacklenme</h1></div><div class="header-right"><div class="progress-dots">${dots}</div><div class="step-indicator">${s+1} / ${SCENES.length}</div></div></div>`}
function renderRiskBar(){const p=Math.min(100,Math.max(0,state.totalRisk));let c=p<=20?'var(--success)':p<=50?'var(--warning)':'var(--danger)';return`<div class="risk-container"><div class="risk-bar-outer"><div class="risk-bar-inner" style="width:${p}%;background:${c}"></div></div><div class="risk-labels"><span>Güvenli</span><span>Risk Seviyesi</span><span>Tehlikede</span></div><div class="risk-score" style="color:${c}">Risk: ${Math.max(0,state.totalRisk)}%</div></div>`}
function renderScene(){const sc=SCENES[state.currentScene];const overlay=OVERLAYS[sc.id];const ch=sc.choices.map((c,i)=>`<button class="choice-btn" onclick="selectChoice(${i})"><span class="choice-label">${String.fromCharCode(65+i)}.</span>${c.text}</button>`).join('');getApp().innerHTML=`${renderHeader()}${renderRiskBar()}<div class="scene-card"><div class="scene-visual"><img src="${IMG[sc.id]}" alt="${sc.title}"><span class="scene-time">🕐 ${sc.time}</span><span class="scene-topic">📌 ${sc.topic}</span>${overlay}</div><div class="scene-body"><h2 class="scene-title">${sc.title}</h2><p class="scene-location">📍 ${sc.location}</p><p class="scene-desc">${sc.desc}</p><div class="choices">${ch}</div></div></div><div class="terminal-ticker">[ SİSTEM AKTİF — TÜM İŞLEMLER İZLENİYOR ]</div>`}
function selectChoice(idx){const sc=SCENES[state.currentScene],ch=sc.choices[idx];state.totalRisk=Math.max(0,state.totalRisk+ch.risk);if(state.totalRisk>state.maxRisk)state.maxRisk=state.totalRisk;state.answers.push({sceneId:sc.id,topic:sc.topic,type:ch.type,risk:ch.risk});const fl=document.getElementById('flash');fl.className='hack-flash '+(ch.type==='wrong'?'danger':'safe');setTimeout(()=>fl.className='hack-flash',700);showFeedback(ch)}
function showFeedback(ch){const cls=ch.type==='correct'?'correct':ch.type==='wrong'?'wrong':'partial';const icon=ch.type==='correct'?'✅':ch.type==='wrong'?'🚨':'⚠️';const msg=ch.type==='correct'?'Doğru seçimi yaptın!':ch.type==='wrong'?'Bu seçim seni riske attı.':'Kötü değil ama daha iyi bir seçenek vardı.';const btn=state.currentScene<SCENES.length-1?'Sonraki Senaryo →':'Sonuçları Gör →';const ov=document.createElement('div');ov.className='feedback-overlay';ov.innerHTML=`<div class="feedback-card ${cls}"><div class="feedback-icon">${icon}</div><h3 class="feedback-title">${ch.feedback}</h3><p class="feedback-text">${msg}</p><div class="feedback-detail">${ch.detail}</div><button class="feedback-btn" onclick="closeFeedback()">${btn}</button></div>`;document.body.appendChild(ov)}
function closeFeedback(){const ov=document.querySelector('.feedback-overlay');if(ov)ov.remove();state.currentScene++;if(state.currentScene<SCENES.length)renderScene();else renderResult()}
function renderResult(){const risk=Math.max(0,state.totalRisk);const correct=state.answers.filter(a=>a.type==='correct').length;const wrong=state.answers.filter(a=>a.type==='wrong').length;const partial=state.answers.filter(a=>a.type==='partial').length;let badge,title,subtitle,badgeBg;if(risk<=10){badge='🏆';title='Güvenlik Şampiyonu!';subtitle='Mükemmel! Her senaryoda doğru kararları verdin.';badgeBg='background:linear-gradient(135deg,rgba(0,230,118,.15),rgba(0,230,118,.05));border:2px solid rgba(0,230,118,.3)'}else if(risk<=35){badge='🛡️';title='Bilinçli Çalışan';subtitle='İyi gidiyorsun ama bazı konularda dikkatli olmalısın.';badgeBg='background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(0,229,255,.05));border:2px solid rgba(0,229,255,.3)'}else if(risk<=65){badge='⚠️';title='Risk Altındasın';subtitle='Birçok senaryoda güvenlik açığı yarattın.';badgeBg='background:linear-gradient(135deg,rgba(255,171,0,.15),rgba(255,171,0,.05));border:2px solid rgba(255,171,0,.3)'}else{badge='💀';title='Hacker\'ın Rüyası';subtitle='Neredeyse her senaryoda riskli tercih yaptın.';badgeBg='background:linear-gradient(135deg,rgba(255,23,68,.15),rgba(255,23,68,.05));border:2px solid rgba(255,23,68,.3)'}const icons=['📶','🚪','✉️','🔑','🤖','☁️','👥'];const bd=state.answers.map((a,i)=>{const sc=SCENES[i];let rc=a.type==='correct'?'safe':a.type==='wrong'?'risky':'partial-r';let rt=a.type==='correct'?'GÜVENLİ':a.type==='wrong'?'RİSKLİ':'KISMİ';return`<div class="breakdown-item"><span class="bi-icon">${icons[i]}</span><span class="bi-topic">${sc.topic}</span><span class="bi-result ${rc}">${rt}</span></div>`}).join('');getApp().innerHTML=`<div class="result-screen"><div class="result-badge" style="${badgeBg}">${badge}</div><h2 class="result-title">${title}</h2><p class="result-subtitle">${subtitle}</p><div class="result-stats"><div class="stat-box"><div class="stat-value" style="color:var(--success)">${correct}</div><div class="stat-label">Doğru</div></div><div class="stat-box"><div class="stat-value" style="color:var(--warning)">${partial}</div><div class="stat-label">Kısmen</div></div><div class="stat-box"><div class="stat-value" style="color:var(--danger)">${wrong}</div><div class="stat-label">Riskli</div></div></div><div class="result-breakdown">${bd}</div><button class="restart-btn" onclick="renderIntro()">🔄 Tekrar Oyna</button></div>`}
renderIntro();
</script>
</body>
</html>
